# Run from this directory on the server:  sudo docker compose up -d
# Requires: image jwst-tool:latest built (server_setup.sh), data volumes
# populated under /srv/vulcan-data, and .env configured (copy env.example).
services:
  app:
    image: jwst-tool:latest
    restart: unless-stopped
    stop_grace_period: 30s
    volumes:
      - /srv/vulcan-data/jwst-data:/srv/vulcan/vulcan-jwst-tool/data
      - /srv/vulcan-data/retrieval-data:/srv/vulcan/vulcan-retrieval/data
      - /srv/vulcan-data/output:/srv/vulcan/vulcan-jwst-tool/output
      - /srv/vulcan-data/retrieval-output:/srv/vulcan/vulcan-retrieval/output
      - /srv/vulcan-data/home:/srv/home
    # No host ports: only caddy reaches it on the compose network.

  caddy:
    image: caddy:2
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    # env_file passes values RAW (no $-interpolation), which matters because
    # the bcrypt hash in BASIC_AUTH_HASH contains $ characters.
    env_file:
      - .env
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - app

volumes:
  caddy_data:
  caddy_config:
