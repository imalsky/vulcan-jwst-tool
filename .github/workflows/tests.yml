name: tests

# Fast, dependency-light CI: the whole unit suite is numpy-only (the pandeia and
# JAX/VULCAN-JAX/ExoJax imports are function-local, so every jwst_tool module
# imports with numpy alone). It exercises the count-space binning operator, the
# noise/floor/covariance math, detection + Fisher nuisance projection, the
# scenario covariances, and the forward-param gating. The env-gated slow test
# (JWST_TOOL_RUN_SLOW=1: 3 real forward runs) and the pandeia/PandExo parity
# harness are NOT run here -- those need the full stack and run locally / on HPC.
on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      matrix:
        # requires-python = ">=3.10"; 3.10 is the NAS deploy interpreter. Keep
        # all three tested so the floor claim stays verified.
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install minimal deps (no pandeia / VULCAN-JAX stack)
        # --no-deps: vulcan-retrieval lives on TestPyPI, so a plain editable
        # install would try (and fail) to resolve it from PyPI. The unit suite
        # never reaches the function-local retrieval_framework imports.
        run: |
          pip install "jax>=0.6" numpy scipy matplotlib pytest
          pip install --no-deps -e .
      - name: Run unit tests
        run: python -m pytest tests -q -ra
